<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>

    <linearGradient id="sweepGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#FF6600" stop-opacity="0"/>
      <stop offset="42%" stop-color="#FF6600" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="58%" stop-color="#FF6600" stop-opacity="0"/>
      <stop offset="100%" stop-color="#FF6600" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate"
        from="-1 0" to="2 0" dur="3s" repeatCount="indefinite"/>
    </linearGradient>

    <clipPath id="textClip">
      <text x="450" y="118" font-family="'Fira Code', monospace" font-size="52" font-weight="900" text-anchor="middle">DINUJA RANSARA</text>
    </clipPath>
  </defs>

  <!-- background -->
  <rect width="900" height="220" fill="url(#bgGrad)"/>

  <!-- faint scanlines for a HUD feel -->
  <g stroke="#FF6600" stroke-opacity="0.08">
    <line x1="0" y1="30" x2="900" y2="30"/>
    <line x1="0" y1="190" x2="900" y2="190"/>
  </g>

  <!-- corner brackets -->
  <g stroke="#FF6600" stroke-width="2" fill="none" opacity="0.8">
    <path d="M18,18 L18,42 M18,18 L42,18"/>
    <path d="M882,18 L882,42 M882,18 L858,18"/>
    <path d="M18,202 L18,178 M18,202 L42,202"/>
    <path d="M882,202 L882,178 M882,202 L858,202"/>
  </g>

  <!-- base text -->
  <text x="450" y="118" font-family="'Fira Code', monospace" font-size="52" font-weight="900" text-anchor="middle" fill="#FF6600">DINUJA RANSARA</text>

  <!-- light sweep clipped to the text shape -->
  <text x="450" y="118" font-family="'Fira Code', monospace" font-size="52" font-weight="900" text-anchor="middle" fill="url(#sweepGrad)" clip-path="url(#textClip)">DINUJA RANSARA</text>

  <!-- subtitle -->
  <text x="450" y="156" font-family="'Fira Code', monospace" font-size="16" letter-spacing="2" text-anchor="middle" fill="#FFFFFF" opacity="0.75">COMPUTER SCIENCE UNDERGRAD // FUTURE ENTREPRENEUR</text>

  <!-- blinking cursor -->
  <rect x="612" y="142" width="10" height="18" fill="#FF6600">
    <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- outer frame -->
  <rect x="1" y="1" width="898" height="218" fill="none" stroke="#FF6600" stroke-width="2" opacity="0.6"/>
</svg>
