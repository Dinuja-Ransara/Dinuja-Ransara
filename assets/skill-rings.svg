<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .label { font-family: 'Fira Code', monospace; font-weight: 900; fill: #FFFFFF; }
      .pct   { font-family: 'Fira Code', monospace; font-weight: 900; fill: #FF6600; }
    </style>
  </defs>

  <rect width="900" height="200" fill="#0D1117"/>

  <!-- JAVA 88% -->
  <g transform="translate(75,100)">
    <circle r="42" fill="none" stroke="#1f1f1f" stroke-width="10"/>
    <circle r="42" fill="none" stroke="#FF6600" stroke-width="10" stroke-linecap="round"
      transform="rotate(-90)" stroke-dasharray="263.89" stroke-dashoffset="263.89">
      <animate attributeName="stroke-dashoffset" from="263.89" to="31.67" dur="1.6s" fill="freeze" begin="0.1s"/>
    </circle>
    <text class="pct" x="0" y="6" font-size="18" text-anchor="middle">88%</text>
    <text class="label" x="0" y="70" font-size="13" text-anchor="middle">JAVA</text>
  </g>

  <!-- SPRING BOOT 85% -->
  <g transform="translate(225,100)">
    <circle r="42" fill="none" stroke="#1f1f1f" stroke-width="10"/>
    <circle r="42" fill="none" stroke="#FF6600" stroke-width="10" stroke-linecap="round"
      transform="rotate(-90)" stroke-dasharray="263.89" stroke-dashoffset="263.89">
      <animate attributeName="stroke-dashoffset" from="263.89" to="39.58" dur="1.6s" fill="freeze" begin="0.25s"/>
    </circle>
    <text class="pct" x="0" y="6" font-size="18" text-anchor="middle">85%</text>
    <text class="label" x="0" y="70" font-size="13" text-anchor="middle">SPRING</text>
  </g>

  <!-- PROBLEM SOLVING 92% -->
  <g transform="translate(375,100)">
    <circle r="42" fill="none" stroke="#1f1f1f" stroke-width="10"/>
    <circle r="42" fill="none" stroke="#FF6600" stroke-width="10" stroke-linecap="round"
      transform="rotate(-90)" stroke-dasharray="263.89" stroke-dashoffset="263.89">
      <animate attributeName="stroke-dashoffset" from="263.89" to="21.11" dur="1.6s" fill="freeze" begin="0.4s"/>
    </circle>
    <text class="pct" x="0" y="6" font-size="18" text-anchor="middle">92%</text>
    <text class="label" x="0" y="70" font-size="13" text-anchor="middle">SOLVING</text>
  </g>

  <!-- GCP 72% -->
  <g transform="translate(525,100)">
    <circle r="42" fill="none" stroke="#1f1f1f" stroke-width="10"/>
    <circle r="42" fill="none" stroke="#FF6600" stroke-width="10" stroke-linecap="round"
      transform="rotate(-90)" stroke-dasharray="263.89" stroke-dashoffset="263.89">
      <animate attributeName="stroke-dashoffset" from="263.89" to="73.89" dur="1.6s" fill="freeze" begin="0.55s"/>
    </circle>
    <text class="pct" x="0" y="6" font-size="18" text-anchor="middle">72%</text>
    <text class="label" x="0" y="70" font-size="13" text-anchor="middle">GCP</text>
  </g>

  <!-- LEADERSHIP 90% -->
  <g transform="translate(675,100)">
    <circle r="42" fill="none" stroke="#1f1f1f" stroke-width="10"/>
    <circle r="42" fill="none" stroke="#FF6600" stroke-width="10" stroke-linecap="round"
      transform="rotate(-90)" stroke-dasharray="263.89" stroke-dashoffset="263.89">
      <animate attributeName="stroke-dashoffset" from="263.89" to="26.39" dur="1.6s" fill="freeze" begin="0.7s"/>
    </circle>
    <text class="pct" x="0" y="6" font-size="18" text-anchor="middle">90%</text>
    <text class="label" x="0" y="70" font-size="13" text-anchor="middle">LEAD</text>
  </g>

  <!-- DESIGN 86% -->
  <g transform="translate(825,100)">
    <circle r="42" fill="none" stroke="#1f1f1f" stroke-width="10"/>
    <circle r="42" fill="none" stroke="#FF6600" stroke-width="10" stroke-linecap="round"
      transform="rotate(-90)" stroke-dasharray="263.89" stroke-dashoffset="263.89">
      <animate attributeName="stroke-dashoffset" from="263.89" to="36.95" dur="1.6s" fill="freeze" begin="0.85s"/>
    </circle>
    <text class="pct" x="0" y="6" font-size="18" text-anchor="middle">86%</text>
    <text class="label" x="0" y="70" font-size="13" text-anchor="middle">DESIGN</text>
  </g>
</svg>
